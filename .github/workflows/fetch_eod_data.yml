name: Daily EOD Market Data

on:
  schedule:
    # Runs at 10pm UTC every day (after US market close)
    - cron: "0 22 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back (for backfill)"
        required: false
        default: "1"

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch EOD data and update Google Sheet
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_NAME: ${{ secrets.SPREADSHEET_NAME }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '1' }}
        run: python fetch_eod_data.py
