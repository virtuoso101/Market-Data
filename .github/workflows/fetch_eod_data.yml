name: Daily EOD Market Data

on:
  schedule:
    # Runs at 10pm UTC every day (after US market close)
    - cron: "0 22 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back (for backfill)"
        required: false
        default: "1"

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- EOD Market Data (Assets) ---

      - name: Fetch EOD asset data
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_NAME: ${{ secrets.SPREADSHEET_NAME }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '1' }}
        run: python fetch_eod_data.py

      - name: Calculate technical indicators
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_NAME: ${{ secrets.SPREADSHEET_NAME }}
        run: python calculate_indicators.py

      - name: Export asset CSVs to Google Drive
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_NAME: ${{ secrets.SPREADSHEET_NAME }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python export_csv.py

      # --- EOD Indices Data ---

      - name: Fetch EOD indices data
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_NAME: ${{ secrets.INDICES_SPREADSHEET_NAME }}
          ASSETS_WORKSHEET_NAME: "Indices"
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '1' }}
          DEFAULT_ASSETS_JSON: '[["^GSPC","S&P 500"],["^IXIC","NASDAQ Composite"],["^FTSE","FTSE 100"],["^GDAXI","DAX"],["^N225","Nikkei 225"],["^VIX","CBOE Volatility Index"],["GBPUSD=X","GBP/USD"],["GBPEUR=X","GBP/EUR"],["GBPJPY=X","GBP/JPY"],["GC=F","Gold Futures"]]'
        run: python fetch_eod_data.py

      - name: Export indices CSVs to Google Drive
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_NAME: ${{ secrets.INDICES_SPREADSHEET_NAME }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          EXPORT_TABS: "Indices,Daily"
        run: python export_csv.py
